<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Transcriber Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #f2f2f7; --card-bg: #ffffff; --primary: #007aff;
            --danger: #ff3b30; --success: #34c759; --text: #1c1c1e;
            --secondary-text: #8e8e93; --border: #e5e5ea;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 440px; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 14px; }
        h1 { font-size: 18px; font-weight: 700; text-align: center; margin: 0; }
        
        .recorder-vitals { display: flex; flex-direction: column; align-items: center; padding: 10px 0; background: #f8f8fa; border-radius: 20px; }
        #timer { font-size: 32px; font-weight: 200; font-variant-numeric: tabular-nums; }
        .recording-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; display: none; }
        .recording-dot.active { display: block; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .progress-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; display: none; overflow: hidden; margin-top: -5px; }
        #progressBar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s; }

        .device-selector { display: flex; flex-direction: column; gap: 5px; }
        select { padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: #fff; font-size: 13px; outline: none; }
        .refresh-link { font-size: 11px; color: var(--primary); text-align: right; cursor: pointer; text-decoration: underline; }

        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:active { transform: scale(0.96); }
        .btn-rec { background: var(--danger); color: white; grid-column: span 2; }
        .btn-pause { background: #ff9500; color: white; display: none; }
        .btn-file { background: #e5e5ea; color: var(--text); }
        .btn-trans { background: var(--primary); color: white; grid-column: span 2; }
        
        .utility-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .btn-util { background: #f2f2f7; color: var(--primary); font-size: 11px; padding: 10px; border-radius: 10px; font-weight: 500; text-align: center; }
        .btn-clear { color: var(--danger); grid-column: span 2; margin-top: 4px; border: 1px dashed #ff3b3033; }

        #output { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; min-height: 180px; max-height: 300px; overflow-y: auto; font-size: 15px; line-height: 1.6; outline: none; white-space: pre-wrap; word-wrap: break-word; text-align: left; }
        #status { font-size: 11px; color: var(--secondary-text); text-align: center; }
        .export-group { display: none; gap: 10px; }
        .btn-exp { flex: 1; background: #3a3a3c; color: white; }
        .ts { color: var(--primary); font-family: monospace; font-weight: bold; margin-right: 5px; }

        @media print {
            h1, .recorder-vitals, .device-selector, .main-actions, #status, .utility-grid, .export-group, #saveBadge, .refresh-link, .progress-container { display: none !important; }
            #output { border: none !important; overflow: visible !important; max-height: none !important; height: auto !important; padding: 0; }
            .ts { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Smart Transcriber</h1>
        
        <div class="recorder-vitals">
            <div id="timer">00:00:00</div>
            <div id="recordingIndicator" class="recording-dot"></div>
            <div id="status">Загрузка AI...</div>
        </div>

        <div class="device-selector">
            <select id="micSelect"><option value="">Выбор микрофона...</option></select>
            <div class="refresh-link" id="refreshMics">Обновить устройства</div>
        </div>

        <div class="main-actions">
            <button id="recBtn" class="btn-rec">● Начать запись</button>
            <button id="pauseBtn" class="btn-pause">⏸ Пауза</button>
            <button id="fileBtn" class="btn-file">📁 Файл</button>
            <input type="file" id="fInput" accept="audio/*,video/*" style="display:none">
            <button id="runBtn" class="btn-trans" disabled>✨ Транскрибировать</button>
        </div>

        <div class="progress-container" id="pCont"><div id="progressBar"></div></div>

        <div id="output" contenteditable="true"></div>
        
        <div class="utility-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span id="saveBadge" style="font-size: 10px; color: var(--success); opacity: 0; transition: 0.3s; font-weight: 600;">✓ Сохранено</span>
            </div>
            <div class="utility-grid">
                <button id="noTsBtn" class="btn-util">Убрать время</button>
                <button id="copyBtn" class="btn-util">Копировать</button>
                <button id="shareBtn" class="btn-util">Поделиться</button>
                <button id="clearBtn" class="btn-util btn-clear">🗑 Очистить всё</button>
            </div>
        </div>

        <div class="export-group" id="expZone">
            <button id="saveTxt" class="btn-exp">TXT</button>
            <button id="savePdf" class="btn-exp">PDF</button>
        </div>
    </div>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    env.allowLocalModels = false; env.useBrowserCache = true;

    let recorder, chunks = [], blob = null, transcriber = null;
    let startTime, timerInterval, pausedTime = 0;

    const micSelect = document.getElementById('micSelect');
    const btnRec = document.getElementById('recBtn');
    const btnPause = document.getElementById('pauseBtn');
    const btnRun = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const timerDisplay = document.getElementById('timer');
    const pCont = document.getElementById('pCont');
    const pBar = document.getElementById('progressBar');
    const saveBadge = document.getElementById('saveBadge');

    document.getElementById('savePdf').onclick = () => { document.activeElement.blur(); setTimeout(() => { window.print(); }, 300); };

    async function getMicrophones() {
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioDevices = devices.filter(d => d.kind === 'audioinput');
            micSelect.innerHTML = audioDevices.map(d => `<option value="${d.deviceId}">${d.label || 'Микрофон ' + (micSelect.length + 1)}</option>`).join('');
        } catch (e) { status.innerText = "Ошибка аудиовхода"; }
    }

    window.onload = async () => {
        const savedText = localStorage.getItem('transcription_text');
        if (savedText) { output.innerHTML = savedText; document.getElementById('expZone').style.display = 'flex'; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => t.stop());
            await getMicrophones();
        } catch (e) { micSelect.innerHTML = '<option>Доступ ограничен</option>'; }
    };

    document.getElementById('refreshMics').onclick = getMicrophones;

    const triggerSave = (msg = "✓ Сохранено") => {
        localStorage.setItem('transcription_text', output.innerHTML);
        saveBadge.innerText = msg;
        saveBadge.style.opacity = 1;
        setTimeout(() => saveBadge.style.opacity = 0, 1500);
    };

    output.oninput = () => triggerSave();

    // Удаление таймстампов
    document.getElementById('noTsBtn').onclick = () => {
        if (!output.innerText.trim()) return;
        output.innerHTML = output.innerHTML.replace(/<span class="ts">\[\d+с\]<\/span>/g, '').trim();
        triggerSave("Таймстампы удалены");
    };

    // Копирование в буфер
    document.getElementById('copyBtn').onclick = async () => {
        const text = output.innerText;
        if (!text) return;
        try {
            await navigator.clipboard.writeText(text);
            triggerSave("✓ Скопировано в буфер");
        } catch (err) { alert("Ошибка копирования"); }
    };

    // Поделиться (Share API)
    document.getElementById('shareBtn').onclick = async () => {
        const text = output.innerText;
        if (!text) return;
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Транскрипция', text: text });
            } catch (err) { console.log("Отмена отправки"); }
        } else {
            alert("Ваш браузер не поддерживает отправку. Используйте Копирование.");
        }
    };

    document.getElementById('clearBtn').onclick = () => {
        if (confirm("Очистить текущую сессию?")) { 
            localStorage.removeItem('transcription_text'); output.innerHTML = ""; 
            timerDisplay.innerText = "00:00:00"; document.getElementById('expZone').style.display = 'none';
        }
    };

    (async () => {
        try {
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base');
            status.innerText = "Готов к работе";
        } catch (e) { status.innerText = "Ошибка AI"; }
    })();

    function updateTimer() {
        const now = Date.now();
        const diff = new Date(now - startTime + pausedTime);
        timerDisplay.innerText = `00:${String(diff.getUTCMinutes()).padStart(2, '0')}:${String(diff.getUTCSeconds()).padStart(2, '0')}`;
    }

    btnRec.onclick = async () => {
        if (!recorder || recorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: micSelect.value ? { exact: micSelect.value } : undefined } });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    blob = new Blob(chunks, { type: 'audio/wav' });
                    btnRun.disabled = false;
                    status.innerText = "Запись готова";
                    document.getElementById('recordingIndicator').classList.remove('active');
                    clearInterval(timerInterval);
                };
                recorder.start();
                startTime = Date.now(); pausedTime = 0;
                timerInterval = setInterval(updateTimer, 1000);
                btnRec.innerText = "■ Стоп"; btnPause.style.display = "block";
                document.getElementById('recordingIndicator').classList.add('active');
            } catch(e) { alert("Микрофон недоступен"); }
        } else {
            recorder.stop(); btnRec.innerText = "● Запись"; btnPause.style.display = "none";
        }
    };

    btnPause.onclick = () => {
        if (recorder.state === "recording") {
            recorder.pause(); clearInterval(timerInterval); pausedTime += Date.now() - startTime;
            btnPause.innerText = "▶ Продолжить";
        } else {
            recorder.resume(); startTime = Date.now(); timerInterval = setInterval(updateTimer, 1000);
            btnPause.innerText = "⏸ Пауза";
        }
    };

    document.getElementById('fileBtn').onclick = () => document.getElementById('fInput').click();
    document.getElementById('fInput').onchange = (e) => { blob = e.target.files[0]; btnRun.disabled = false; status.innerText = "Файл готов"; };

    btnRun.onclick = async () => {
        status.innerText = "Обработка..."; btnRun.disabled = true;
        pCont.style.display = "block"; pBar.style.width = "0%";
        try {
            const ctx = new AudioContext({ sampleRate: 16000 });
            const decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
            const res = await transcriber(decoded.getChannelData(0), { 
                language: 'russian', return_timestamps: true, temperature: 0,
                no_speech_threshold: 0.4, compression_ratio_threshold: 2.4, condition_on_previous_text: true
            });
            let finalHtml = ""; let lastEndTime = 0;
            res.chunks.forEach((chunk, i) => {
                const start = chunk.timestamp[0];
                if (i > 0 && (start - lastEndTime) > 1.5) finalHtml += "\n\n";
                finalHtml += `<span class="ts">[${Math.floor(start)}с]</span>${chunk.text} `;
                lastEndTime = chunk.timestamp[1];
                pBar.style.width = ((i / res.chunks.length) * 100) + "%";
            });
            output.innerHTML = finalHtml.trim();
            triggerSave("Транскрипция завершена");
            status.innerText = "Готово";
            document.getElementById('expZone').style.display = 'flex';
        } catch (e) { status.innerText = "Ошибка"; }
        btnRun.disabled = false; pBar.style.width = "100%";
        setTimeout(() => { pCont.style.display = "none"; }, 1000);
    };

    document.getElementById('saveTxt').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([output.innerText], {type: 'text/plain'}));
        a.download = `note.txt`; a.click();
    };

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
