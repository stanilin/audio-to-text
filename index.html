<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceTranscribe Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #fdfdfd; --text: #333; --accent: #007aff; --danger: #eb4d4b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-card { max-width: 500px; width: 100%; background: #fff; border: 1px solid #eee; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn-rec { background: var(--danger); color: white; }
        .btn-file { background: #f0f0f5; color: var(--text); }
        .btn-main { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
        button:disabled { opacity: 0.3; }
        #status { font-size: 0.8rem; color: #999; text-align: center; margin: 15px 0; padding: 5px; border-radius: 5px; border: 1px solid transparent; }
        .loading { border-color: #eee; background: #fcfcfc; }
        #output { background: #fafafa; border-radius: 12px; padding: 15px; min-height: 120px; font-size: 0.95rem; border: 1px solid #f0f0f0; line-height: 1.6; }
        .export-actions { display: none; gap: 10px; margin-top: 20px; }
        .btn-exp { background: #333; color: white; }
        .ts { color: var(--accent); font-family: monospace; font-weight: 600; margin-right: 8px; }
        @media print { .btn-group, .btn-main, #status, .export-actions, h1 { display: none !important; } #output { border: none; } }
    </style>
</head>
<body>

<div class="app-card">
    <h1 style="text-align:center; font-size: 1.2rem; font-weight: 500;">Голосовой ассистент</h1>

    <div class="btn-group">
        <button id="recBtn" class="btn-rec">Запись</button>
        <button id="fileBtn" class="btn-file">Файл</button>
        <input type="file" id="fInput" accept="audio/*,video/*" style="display:none">
    </div>

    <button id="runBtn" class="btn-main" disabled>Транскрибировать</button>
    <div id="status">Инициализация...</div>
    <div id="output">Текст появится здесь...</div>

    <div class="export-actions" id="expZone">
        <button id="saveTxtBtn" class="btn-exp">Сохранить TXT</button>
        <button onclick="window.print()" class="btn-exp">Сохранить PDF</button>
    </div>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Конфигурация для работы в браузере
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    let recorder, chunks = [], blob = null, transcriber = null;

    const btnRec = document.getElementById('recBtn');
    const btnRun = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const expZone = document.getElementById('expZone');

    async function initAI() {
        try {
            status.innerText = "Загрузка AI модели (около 75MB)...";
            status.classList.add('loading');
            
            // Явное указание задачи и модели
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en'); 
            // Примечание: .en — самая маленькая. Если нужен мультиязык (русский), используйте 'Xenova/whisper-tiny'
            
            status.innerText = "Система готова";
            status.classList.remove('loading');
        } catch (e) {
            console.error(e);
            status.innerText = "Ошибка: " + e.message;
        }
    }

    initAI();

    btnRec.onclick = async () => {
        if (recorder?.state === "recording") {
            recorder.stop();
            btnRec.innerText = "Запись";
            btnRec.style.background = "";
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    blob = new Blob(chunks, { type: 'audio/wav' });
                    btnRun.disabled = false;
                    status.innerText = "Аудиозапись готова";
                };
                recorder.start();
                btnRec.innerText = "Стоп";
                btnRec.style.background = "#333";
            } catch(e) { alert("Нет доступа к микрофону"); }
        }
    };

    document.getElementById('fileBtn').onclick = () => document.getElementById('fInput').click();
    document.getElementById('fInput').onchange = (e) => {
        blob = e.target.files[0];
        if(blob) { btnRun.disabled = false; status.innerText = "Файл выбран"; }
    };

    btnRun.onclick = async () => {
        status.innerText = "Обработка... Подождите";
        btnRun.disabled = true;
        try {
            const ctx = new AudioContext({ sampleRate: 16000 });
            const decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
            const audioData = decoded.getChannelData(0);

            const result = await transcriber(audioData, { 
                return_timestamps: true,
                chunk_length_s: 30,
                stride_length_s: 5
            });

            output.innerHTML = result.chunks.map(c => 
                `<div><span class="ts">[${Math.floor(c.timestamp[0])}с]</span> ${c.text}</div>`
            ).join('');

            status.innerText = "Готово";
            expZone.style.display = 'flex';
        } catch (err) {
            status.innerText = "Ошибка транскрибации";
            console.error(err);
        } finally {
            btnRun.disabled = false;
        }
    };

    document.getElementById('saveTxtBtn').onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([output.innerText], {type: 'text/plain'}));
        a.download = `text.txt`;
        a.click();
    };
</script>
</body>
</html>
