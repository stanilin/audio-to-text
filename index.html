<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Transcriber Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --bg: #f2f2f7; --card-bg: #ffffff; --primary: #007aff; --danger: #ff3b30; --success: #34c759; --text: #1c1c1e; --secondary-text: #8e8e93; --border: #e5e5ea; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 440px; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); display: flex; flex-direction: column; gap: 14px; }
        h1 { font-size: 18px; font-weight: 700; text-align: center; margin: 0; }
        .recorder-vitals { display: flex; flex-direction: column; align-items: center; padding: 10px 0; background: #f8f8fa; border-radius: 20px; }
        #timer { font-size: 32px; font-weight: 200; font-variant-numeric: tabular-nums; }
        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; display: none; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s linear; }
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-rec { background: var(--danger); color: white; grid-column: span 2; }
        .btn-trans { background: var(--primary); color: white; grid-column: span 2; }
        .utility-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-util { background: #f2f2f7; color: var(--primary); font-size: 11px; padding: 10px; border-radius: 10px; }
        #output { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; min-height: 180px; max-height: 300px; overflow-y: auto; font-size: 15px; line-height: 1.6; outline: none; white-space: pre-wrap; text-align: left; }
        .ts { color: var(--primary); font-family: monospace; font-weight: bold; margin-right: 5px; }
        #status { font-size: 11px; color: var(--secondary-text); text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Smart Transcriber</h1>
        <div class="recorder-vitals">
            <div id="timer">00:00:00</div>
            <div id="status">Инициализация AI...</div>
        </div>
        <div class="main-actions">
            <button id="recBtn" class="btn-rec">● Начать запись</button>
            <button id="fileBtn" style="background:#e5e5ea">📁 Файл</button>
            <input type="file" id="fInput" style="display:none">
            <button id="runBtn" class="btn-trans" disabled>✨ Транскрибировать</button>
        </div>
        <div class="progress-container" id="pCont"><div id="progressBar"></div></div>
        <div id="output" contenteditable="true"></div>
        <div class="utility-grid">
            <button id="noTsBtn" class="btn-util">Убрать время</button>
            <button id="copyBtn" class="btn-util">Копировать</button>
            <button id="shareBtn" class="btn-util">Поделиться</button>
            <button id="clearBtn" class="btn-util" style="color:red">🗑 Очистить</button>
        </div>
    </div>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
    env.allowLocalModels = false;

    let recorder, chunks = [], blob = null, transcriber = null;
    let startTime, timerInterval;

    const btnRun = document.getElementById('runBtn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const pBar = document.getElementById('progressBar');
    const pCont = document.getElementById('pCont');

    // ЗАГРУЗКА БОЛЕЕ СТАБИЛЬНОЙ МОДЕЛИ TINY
    (async () => {
        try {
            transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny');
            status.innerText = "Готов к работе (Tiny)";
        } catch (e) { status.innerText = "Ошибка загрузки"; }
    })();

    document.getElementById('recBtn').onclick = async () => {
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                blob = new Blob(chunks, { type: 'audio/wav' });
                btnRun.disabled = false;
                status.innerText = "Запись готова";
            };
            recorder.start();
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const d = new Date(Date.now() - startTime);
                document.getElementById('timer').innerText = `00:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}`;
            }, 1000);
            document.getElementById('recBtn').innerText = "■ Остановить";
        } else {
            recorder.stop();
            clearInterval(timerInterval);
            document.getElementById('recBtn').innerText = "● Начать запись";
        }
    };

    btnRun.onclick = async () => {
        status.innerText = "Транскрипция...";
        btnRun.disabled = true;
        pCont.style.display = "block";
        pBar.style.width = "5%";

        try {
            const ctx = new AudioContext({ sampleRate: 16000 });
            const decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
            
            let progress = 5;
            const progInt = setInterval(() => {
                if (progress < 95) { progress += 1; pBar.style.width = progress + "%"; }
            }, 400);

            const res = await transcriber(decoded.getChannelData(0), { 
                language: 'russian',
                return_timestamps: true,
                temperature: 0,
                no_speech_threshold: 0.5, // Более жестко к шуму
                compression_ratio_threshold: 2.0,
                logprob_threshold: -1.0
            });

            clearInterval(progInt);
            pBar.style.width = "100%";

            let html = ""; let lastEnd = 0;
            res.chunks.forEach((c, i) => {
                // ПРОГРАММНЫЙ ФИЛЬТР ПОВТОРОВ (Убирает Д-д-д на лету)
                let cleanText = c.text.replace(/(.)\1{4,}/g, ''); 
                if (cleanText.trim().length < 2) return; // Игнорируем мусорные куски

                if (i > 0 && (c.timestamp[0] - lastEnd) > 1.5) html += "\n\n";
                html += `<span class="ts">[${Math.floor(c.timestamp[0])}с]</span>${cleanText} `;
                lastEnd = c.timestamp[1];
            });

            output.innerHTML = html.trim() || "Речь не распознана. Попробуйте записать громче.";
            status.innerText = "Завершено";
        } catch (e) { status.innerText = "Ошибка"; console.error(e); }
        btnRun.disabled = false;
        setTimeout(() => pCont.style.display = "none", 1500);
    };

    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(output.innerText);
        status.innerText = "Скопировано!";
    };
    document.getElementById('noTsBtn').onclick = () => {
        output.innerHTML = output.innerHTML.replace(/<span class="ts">\[\d+с\]<\/span>/g, '').trim();
    };
    document.getElementById('clearBtn').onclick = () => { output.innerHTML = ""; };
    document.getElementById('shareBtn').onclick = () => {
        if (navigator.share) navigator.share({ text: output.innerText });
    };
</script>
</body>
</html>
